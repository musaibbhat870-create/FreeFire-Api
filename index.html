<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FF Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090f;
    --surface: #0d1117;
    --surface2: #131a24;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff4655;
    --gold: #ffd700;
    --text: #c9d8e8;
    --muted: #4a6278;
    --green: #00ff88;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,229,255,0.06); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,70,85,0.05); bottom: 0; left: -100px; }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 28px;
  }
  .header-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 5px 16px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    color: #fff;
  }
  .header h1 span { color: var(--accent2); }
  .header p {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab:first-child { border-right: 1px solid var(--border); }
  .tab.active {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
  }

  /* Search panels */
  .panel { display: none; }
  .panel.active { display: block; }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .field-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .field-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .field-row:last-child { margin-bottom: 0; }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  .btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::before { opacity: 0.1; }
  .btn:active { transform: scale(0.98); }
  .btn.loading { opacity: 0.6; pointer-events: none; }

  /* Stats display */
  .result-area { margin-top: 20px; }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .player-header {
    background: linear-gradient(135deg, rgba(0,229,255,0.08), rgba(255,70,85,0.05));
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .player-avatar {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .player-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 3px;
  }
  .player-region {
    margin-left: auto;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 2px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .stat-cell {
    background: var(--surface);
    padding: 14px 16px;
  }
  .stat-cell .s-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-cell .s-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
  }
  .stat-cell .s-value.accent { color: var(--accent); }
  .stat-cell .s-value.gold { color: var(--gold); }
  .stat-cell .s-value.green { color: var(--green); }
  .stat-cell .s-value.red { color: var(--accent2); }

  /* Search results list */
  .results-list { display: flex; flex-direction: column; gap: 10px; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .result-item:hover {
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.04);
  }
  .ri-avatar {
    width: 40px;
    height: 40px;
    border-radius: 4px;
    background: linear-gradient(135deg, #1e2d3d, #0d1117);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }
  .ri-info { flex: 1; min-width: 0; }
  .ri-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ri-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .ri-level {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  /* Error / empty states */
  .state-box {
    text-align: center;
    padding: 40px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .state-icon { font-size: 2rem; margin-bottom: 10px; }
  .state-title { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent2); letter-spacing: 2px; }
  .state-msg { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }

  /* Loader */
  .loader {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 40px;
  }
  .loader span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 0.8s infinite ease-in-out;
  }
  .loader span:nth-child(2) { animation-delay: 0.15s; background: var(--accent2); }
  .loader span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Section header */
  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  .liked-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    background: rgba(255,70,85,0.1);
    border: 1px solid rgba(255,70,85,0.2);
    padding: 3px 8px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="wrapper">
  <div class="header">
    <div class="header-badge">FREE FIRE INTEL</div>
    <h1>FF <span>STATS</span></h1>
    <p>PLAYER LOOKUP &amp; STATISTICS</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('uid')">🎯 SEARCH BY UID</button>
    <button class="tab" onclick="switchTab('name')">🔍 SEARCH BY NAME</button>
  </div>

  <!-- UID Panel -->
  <div class="panel active" id="panel-uid">
    <div class="search-box">
      <div class="field-row">
        <div style="flex:2">
          <label class="field-label">Player UID</label>
          <input type="number" id="uid-input" placeholder="Enter UID..." />
        </div>
        <div style="flex:1">
          <label class="field-label">Server</label>
          <select id="uid-server">
            <option value="ind">IND</option>
            <option value="bd">BD</option>
            <option value="br">BR</option>
            <option value="sg">SG</option>
            <option value="th">TH</option>
            <option value="vn">VN</option>
            <option value="tw">TW</option>
            <option value="us">US</option>
            <option value="id">ID</option>
            <option value="me">ME</option>
            <option value="pk">PK</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div style="flex:1">
          <label class="field-label">Game Mode</label>
          <select id="uid-gamemode">
            <option value="br">Battle Royale</option>
            <option value="cs">Clash Squad</option>
          </select>
        </div>
        <div style="flex:1">
          <label class="field-label">Match Mode</label>
          <select id="uid-matchmode">
            <option value="RANKED">Ranked</option>
            <option value="NORMAL">Normal</option>
            <option value="CAREER">Career</option>
          </select>
        </div>
      </div>
      <button class="btn" id="uid-btn" onclick="searchByUID()">FETCH STATS</button>
    </div>
    <div class="result-area" id="uid-result"></div>
  </div>

  <!-- Name Panel -->
  <div class="panel" id="panel-name">
    <div class="search-box">
      <div class="field-row">
        <div style="flex:2">
          <label class="field-label">Player Name / Keyword</label>
          <input type="text" id="name-input" placeholder="Enter name..." />
        </div>
        <div style="flex:1">
          <label class="field-label">Server</label>
          <select id="name-server">
            <option value="ind">IND</option>
            <option value="bd">BD</option>
            <option value="br">BR</option>
            <option value="sg">SG</option>
            <option value="th">TH</option>
            <option value="vn">VN</option>
            <option value="tw">TW</option>
            <option value="us">US</option>
            <option value="id">ID</option>
            <option value="me">ME</option>
            <option value="pk">PK</option>
          </select>
        </div>
      </div>
      <button class="btn" id="name-btn" onclick="searchByName()">SEARCH PLAYERS</button>
    </div>
    <div class="result-area" id="name-result"></div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'uid') || (i === 1 && tab === 'name'));
    });
    document.getElementById('panel-uid').classList.toggle('active', tab === 'uid');
    document.getElementById('panel-name').classList.toggle('active', tab === 'name');
  }

  function showLoader(id) {
    document.getElementById(id).innerHTML = `<div class="loader"><span></span><span></span><span></span></div>`;
  }

  function showError(id, msg) {
    document.getElementById(id).innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">ERROR</div>
        <div class="state-msg">${msg}</div>
      </div>`;
  }

  function getLevelColor(level) {
    if (level >= 70) return 'gold';
    if (level >= 50) return 'accent';
    if (level >= 30) return 'green';
    return '';
  }

  async function searchByUID() {
    const uid = document.getElementById('uid-input').value.trim();
    const server = document.getElementById('uid-server').value;
    const gamemode = document.getElementById('uid-gamemode').value;
    const matchmode = document.getElementById('uid-matchmode').value;

    if (!uid) { showError('uid-result', 'Please enter a UID'); return; }

    const btn = document.getElementById('uid-btn');
    btn.classList.add('loading');
    btn.textContent = 'FETCHING...';
    showLoader('uid-result');

    try {
      const res = await fetch(`/get_player_stats?server=${server}&uid=${uid}&gamemode=${gamemode}&matchmode=${matchmode}`);
      const json = await res.json();

      if (!json.success) {
        showError('uid-result', json.message || json.error || 'Failed to fetch stats');
        return;
      }

      const d = json.data;
      const meta = json.metadata;

      const gm = meta.gamemode;
      let kills, deaths, kd, wins, games, damage, hs, rating, topN, highestKills;

      if (gm === 'cs') {
        const p = d.csstats || d;
        const dt = p?.detailedstats || {};
        kills = p?.kills ?? '—';
        deaths = dt.deaths ?? '—';
        kd = (deaths !== '—' && deaths > 0) ? (kills / deaths).toFixed(2) : '—';
        wins = p?.wins ?? '—';
        games = p?.gamesplayed ?? '—';
        damage = dt.damage ? dt.damage.toLocaleString() : '—';
        hs = dt.headShotKills ?? dt.headshotKills ?? '—';
        rating = dt.ratingPoints ? Math.round(dt.ratingPoints) : '—';
        topN = dt.mvpCount ?? '—';
        highestKills = '—';
      } else {
        // BR: sum across solo + duo + quad
        const modes = [d.solostats, d.duostats, d.quadstats].filter(Boolean);
        const sum = (key, sub) => modes.reduce((a, m) => a + (sub ? (m.detailedstats?.[key] || 0) : (m[key] || 0)), 0);
        kills = sum('kills') || '—';
        deaths = sum('deaths', true) || '—';
        kd = (deaths !== '—' && deaths > 0) ? (kills / deaths).toFixed(2) : '—';
        wins = sum('wins') || '—';
        games = sum('gamesplayed') || '—';
        damage = sum('damage', true) ? sum('damage', true).toLocaleString() : '—';
        hs = sum('headshotKills', true) || '—';
        rating = '—';
        topN = sum('topNTimes', true) || '—';
        highestKills = Math.max(...modes.map(m => m.detailedstats?.highestKills || 0)) || '—';
      }

      document.getElementById('uid-result').innerHTML = `
        <div class="player-card">
          <div class="player-header">
            <div class="player-avatar">${uid.toString().slice(-2)}</div>
            <div>
              <div class="player-name">UID ${uid}</div>
              <div class="player-id">SERVER: ${meta.server} · ${meta.gamemode.toUpperCase()} · ${meta.matchmode}</div>
            </div>
            <div class="player-region">${meta.server}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-cell"><div class="s-label">Kills</div><div class="s-value accent">${kills}</div></div>
            <div class="stat-cell"><div class="s-label">Deaths</div><div class="s-value red">${deaths}</div></div>
            <div class="stat-cell"><div class="s-label">K/D Ratio</div><div class="s-value gold">${kd}</div></div>
            <div class="stat-cell"><div class="s-label">Wins</div><div class="s-value green">${wins}</div></div>
            <div class="stat-cell"><div class="s-label">Games Played</div><div class="s-value">${games}</div></div>
            <div class="stat-cell"><div class="s-label">Total Damage</div><div class="s-value accent">${damage}</div></div>
            <div class="stat-cell"><div class="s-label">Headshots</div><div class="s-value">${hs}</div></div>
            <div class="stat-cell"><div class="s-label">Rating</div><div class="s-value gold">${rating}</div></div>
            <div class="stat-cell"><div class="s-label">Top Rankings</div><div class="s-value">${topN}</div></div>
            <div class="stat-cell"><div class="s-label">Highest Kills</div><div class="s-value red">${highestKills}</div></div>
          </div>
        </div>`;
    } catch (e) {
      showError('uid-result', 'Connection error. Is the server running?');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'FETCH STATS';
    }
  }

  async function searchByName() {
    const keyword = document.getElementById('name-input').value.trim();
    const server = document.getElementById('name-server').value;

    if (!keyword) { showError('name-result', 'Please enter a name to search'); return; }
    if (keyword.length < 3) { showError('name-result', 'Keyword must be at least 3 characters'); return; }

    const btn = document.getElementById('name-btn');
    btn.classList.add('loading');
    btn.textContent = 'SEARCHING...';
    showLoader('name-result');

    try {
      const res = await fetch(`/get_search_account_by_keyword?server=${server}&keyword=${encodeURIComponent(keyword)}`);
      const json = await res.json();
      console.log('Search response:', JSON.stringify(json));

      if (json.error) {
        showError('name-result', json.error);
        return;
      }

      // Handle all possible response shapes
      const players = json.infos || json.data?.infos || json.data || (Array.isArray(json) ? json : null);
      if (!players || !Array.isArray(players) || players.length === 0) {
        document.getElementById('name-result').innerHTML = `
          <div class="state-box">
            <div class="state-icon">🔍</div>
            <div class="state-title">NO RESULTS</div>
            <div class="state-msg">No players found for "${keyword}"</div>
          </div>`;
        return;
      }

      const html = players.map(p => `
        <div class="result-item" onclick="selectPlayer('${p.accountid}')">
          <div class="ri-avatar">${(p.nickname || '?')[0].toUpperCase()}</div>
          <div class="ri-info">
            <div class="ri-name">${p.nickname || 'Unknown'}</div>
            <div class="ri-meta">UID: ${p.accountid} · ${p.region || server.toUpperCase()}
              ${p.liked ? ` · <span style="color:var(--accent2)">♥ ${p.liked}</span>` : ''}
            </div>
          </div>
          <div class="ri-level">LV ${p.level || '?'}</div>
        </div>`).join('');

      document.getElementById('name-result').innerHTML = `
        <div class="section-title">${players.length} PLAYER${players.length !== 1 ? 'S' : ''} FOUND</div>
        <div class="results-list">${html}</div>`;

    } catch (e) {
      showError('name-result', 'Connection error. Is the server running?');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'SEARCH PLAYERS';
    }
  }

  function selectPlayer(uid) {
    switchTab('uid');
    document.getElementById('uid-input').value = uid;
    // Sync server
    const server = document.getElementById('name-server').value;
    document.getElementById('uid-server').value = server;
    searchByUID();
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activePanel = document.querySelector('.panel.active').id;
      if (activePanel === 'panel-uid') searchByUID();
      else searchByName();
    }
  });
</script>
</body>
</html>
